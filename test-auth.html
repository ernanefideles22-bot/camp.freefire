<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Autenticação Google</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div style="max-width: 400px; margin: 50px auto; text-align: center; font-family: sans-serif;">
        <h2>Teste de Autenticação SaaS</h2>
        <p>Clique no botão abaixo para testar a integração com o Google.</p>
        
        <button id="btn-google" style="background-color: #4285F4; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer;">
            Entrar com o Google
        </button>

        <div id="status" style="margin-top: 20px; color: #666;"></div>
    </div>

    <script>
        // SUBSITUA ESTES VALORES COM OS DADOS DO SEU PAINEL SUPABASE (Project Settings > API)
        const SUPABASE_URL = "https://seu-projeto.supabase.co";
        const SUPABASE_ANON_KEY = "sua-chave-anon-aqui";

        // Inicializa o cliente do Supabase
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Executa automaticamente para checar se o usuário voltou do login com sucesso
        async function checkUser() {
            const { data: { user }, error } = await supabase.auth.getUser();
            if (user) {
                document.getElementById('status').innerHTML = `
                    <p style="color: green; font-weight: bold;">Autenticado com sucesso!</p>
                    <p>Email: ${user.email}</p>
                `;
                console.log('Dados do usuário:', user);
            }
        }

        // Função que dispara o fluxo OAuth do Google
        async function loginWithGoogle() {
            const { data, error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    // Redireciona de volta para este mesmo arquivo após o login
                    redirectTo: window.location.href 
                }
            });

            if (error) {
                document.getElementById('status').innerText = "Erro no login: " + error.message;
                console.error('Erro:', error);
            }
        }

        // Event Listeners
        document.getElementById('btn-google').addEventListener('click', loginWithGoogle);
        window.addEventListener('DOMContentLoaded', checkUser);
    </script>
</body>
</html>
